groups:
  - name: based_api
    interval: 30s
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

      # API down
      - alert: APIDown
        expr: up{job="based-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API is down"
          description: "Backend API is not responding on {{ $labels.instance }}"

      # Slow responses
      - alert: SlowAPIResponses
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow API responses (p95 > 1s)"
          description: "95th percentile response time is {{ $value }}s on {{ $labels.instance }}"

      # High request rate (potential DDoS)
      - alert: HighRequestRate
        expr: rate(http_requests_total[1m]) > 1000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Unusually high request rate"
          description: "Request rate is {{ $value }}/s on {{ $labels.instance }}"

  - name: based_database
    interval: 30s
    rules:
      # Database down
      - alert: DatabaseDown
        expr: up{job="postgresql"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL database is down"
          description: "Database connection failed on {{ $labels.instance }}"

      # High connection count
      - alert: HighDatabaseConnections
        expr: pg_stat_database_numbackends > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database connection count"
          description: "{{ $value }} active connections on {{ $labels.instance }}"

      # Slow queries
      - alert: SlowDatabaseQueries
        expr: rate(pg_stat_database_tup_fetched[5m]) / rate(pg_stat_database_tup_returned[5m]) < 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Database queries are slow"
          description: "Query efficiency dropped on {{ $labels.instance }}"

  - name: based_system
    interval: 30s
    rules:
      # High CPU usage
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

      # High memory usage
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

      # Disk space low
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space"
          description: "Only {{ $value | humanizePercentage }} disk space remaining on {{ $labels.instance }}"

      # System down
      - alert: InstanceDown
        expr: up{job="node-exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Instance is down"
          description: "Node exporter is not responding on {{ $labels.instance }}"

  - name: based_blockchain
    interval: 60s
    rules:
      # Blockchain node down
      - alert: BlockchainNodeDown
        expr: up{job="base-node"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Base node is down"
          description: "Cannot reach Base node on {{ $labels.instance }}"

      # Node not syncing
      - alert: BlockchainNodeNotSyncing
        expr: base_node_sync_status == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Blockchain node stopped syncing"
          description: "Base node is not syncing on {{ $labels.instance }}"

  - name: based_business
    interval: 60s
    rules:
      - alert: SettlementExecutionsFailing
        expr: rate(based_settlement_executions_total{result="failure"}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Settlement executions failing"
          description: "Settlement failures > 3/min on {{ $labels.instance }} (chain={{ $labels.chain }})"

      - alert: SettlementQueueStalled
        expr: (increase(based_claim_ticket_build_total[15m]) > 0)
          and (increase(based_settlement_executions_total{result="success"}[15m]) == 0)
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Settlement queue stalled"
          description: "Claims are being generated but no settlements executed in the last 15m on {{ $labels.instance }}"

      - alert: MarketResolutionsFailing
        expr: rate(based_market_resolution_total{result="failure"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backend market resolutions failing"
          description: "Resolver errors detected on {{ $labels.instance }} (chain={{ $labels.chain }})"

      - alert: SuiIndexerStalled
        expr: increase(based_sui_events_processed_total[15m]) == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Sui indexer stalled"
          description: "No Sui events processed in the last 15m on {{ $labels.instance }}"

      - alert: SuiIndexerErrors
        expr: rate(based_sui_indexer_polls_total{result="failure"}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Sui indexer experiencing errors"
          description: "Failure rate > 10% over 5m on {{ $labels.instance }}"

      # No bets placed (market stagnation)
      - alert: NoBetsPlaced
        expr: rate(bets_placed_total[1h]) == 0
        for: 2h
        labels:
          severity: info
        annotations:
          summary: "No bets placed in last 2 hours"
          description: "Market activity may be low"

      # High failed transactions
      - alert: HighFailedTransactions
        expr: rate(blockchain_transactions_failed_total[5m]) / rate(blockchain_transactions_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High rate of failed blockchain transactions"
          description: "{{ $value | humanizePercentage }} of transactions failing"

      # Large market payout (potential issue)
      - alert: LargeMarketPayout
        expr: market_payout_amount > 100000
        labels:
          severity: info
        annotations:
          summary: "Large market payout detected"
          description: "Market {{ $labels.market_id }} paid out ${{ $value }}"
