<!DOCTYPE html>
<html>
<head><title>Env Check</title></head>
<body>
<h1>Environment Variable Check</h1>
<pre id="output">Loading...</pre>
<script type="module">
  document.getElementById('output').textContent = JSON.stringify({
    VITE_SUI_PACKAGE_ID: import.meta.env.VITE_SUI_PACKAGE_ID,
    VITE_SUI_NETWORK: import.meta.env.VITE_SUI_NETWORK,
    VITE_APTOS_MODULE_ADDRESS: import.meta.env.VITE_APTOS_MODULE_ADDRESS,
    allKeys: Object.keys(import.meta.env).filter(k => k.startsWith('VITE_'))
  }, null, 2);
</script>
</body>
</html>
