<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Base App ID -->
    <meta name="base:app_id" content="69b96f6d73c302e5790874fd" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Mobile-First Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />

    <!-- SEO Meta Tags -->
    <meta name="description" content="Prophecy — the fairest prediction market on Base. AI-powered resolution, gasless trading, Coinbase Smart Wallet onboarding." />
    <meta name="keywords" content="prediction market, base, coinbase, blockchain, forecasting, defi, prophecy" />
    <meta name="author" content="Prophecy" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://based.vercel.app/" />
    <meta property="og:title" content="Prophecy — Prediction Markets on Base" />
    <meta property="og:description" content="AI-powered prediction markets with gasless trading. UMA + Pyth oracles. Built on Base." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://based.vercel.app/" />
    <meta property="twitter:title" content="Prophecy — Prediction Markets on Base" />
    <meta property="twitter:description" content="AI-powered prediction markets with gasless trading. UMA + Pyth oracles. Built on Base." />
    <meta property="twitter:image" content="/twitter-image.png" />

    <!-- PWA / Mobile App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Prophecy" />
    <meta name="application-name" content="Prophecy" />
    <meta name="theme-color" content="#3B82F6" />
    <meta name="msapplication-TileColor" content="#3B82F6" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://sepolia.base.org" />

    <!-- Fonts: Inter, JetBrains Mono, Baloo 2 (Tiki) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet" />

    <title>Prophecy — Prediction Markets on Base</title>
    <script>
      // Prevent flash of incorrect theme - runs before page renders
      (function() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || savedTheme === 'light') {
          document.documentElement.classList.add(savedTheme);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
