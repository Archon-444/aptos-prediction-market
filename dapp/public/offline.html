<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Offline | Based</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 2.5rem 1.5rem;
        background: #0f172a;
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
      }
      .card {
        max-width: 420px;
        background: rgba(15, 23, 42, 0.85);
        border-radius: 16px;
        padding: 2rem;
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 24px 64px rgba(15, 23, 42, 0.35);
      }
      h1 {
        font-size: 1.75rem;
        margin-bottom: 0.75rem;
      }
      p {
        margin: 0;
        line-height: 1.6;
        color: #cbd5f5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Connection Lost</h1>
      <p>
        You appear to be offline. Reconnect to Based to see live markets, odds, and payouts.
      </p>
    </div>
  </body>
</html>
