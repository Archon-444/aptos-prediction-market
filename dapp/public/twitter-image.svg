<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080B18"/>
      <stop offset="100%" stop-color="#0D1224"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1200" height="628" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="600" cy="260" r="240" fill="#3B82F6" opacity="0.05" filter="url(#softglow)"/>
  <circle cx="600" cy="260" r="180" fill="#8B5CF6" opacity="0.04" filter="url(#softglow)"/>

  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Centered layout -->
  <rect x="510" y="160" width="100" height="100" rx="24" fill="url(#accent)" filter="url(#glow)"/>
  <text x="560" y="234" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="900" font-size="68" fill="white" letter-spacing="-2">B</text>

  <text x="600" y="330" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="900" font-size="56" fill="white" letter-spacing="-2">Based</text>
  <text x="600" y="380" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="500" font-size="24" fill="#94A3B8">Prediction Markets on Base</text>

  <!-- Pill badges -->
  <g transform="translate(600, 430)" text-anchor="middle">
    <rect x="-280" y="-14" width="160" height="28" rx="14" fill="white" opacity="0.06"/>
    <text x="-200" y="5" font-family="Inter,sans-serif" font-weight="500" font-size="13" fill="#94A3B8">AI Resolution</text>
    <rect x="-90" y="-14" width="180" height="28" rx="14" fill="white" opacity="0.06"/>
    <text x="0" y="5" font-family="Inter,sans-serif" font-weight="500" font-size="13" fill="#94A3B8">Gasless Trading</text>
    <rect x="120" y="-14" width="160" height="28" rx="14" fill="white" opacity="0.06"/>
    <text x="200" y="5" font-family="Inter,sans-serif" font-weight="500" font-size="13" fill="#94A3B8">UMA + Pyth</text>
  </g>

  <rect x="0" y="625" width="1200" height="3" fill="url(#accent)"/>
</svg>
