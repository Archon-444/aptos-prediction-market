<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="#080B18"/>
  <rect x="80" y="80" width="352" height="352" rx="80" fill="url(#bg)" filter="url(#glow)"/>
  <text x="256" y="312" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="900" font-size="240" fill="white" letter-spacing="-8">B</text>
</svg>
