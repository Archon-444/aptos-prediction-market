<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark background for maskable safe zone -->
  <rect width="192" height="192" fill="#080B18"/>
  <!-- Gradient rounded square centered in safe zone -->
  <rect x="32" y="32" width="128" height="128" rx="32" fill="url(#bg)" filter="url(#glow)"/>
  <!-- Bold B lettermark -->
  <text x="96" y="118" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="900" font-size="88" fill="white" letter-spacing="-3">B</text>
</svg>
